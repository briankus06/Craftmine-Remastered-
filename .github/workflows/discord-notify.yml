name: Discord Notification
on: [push]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send custom message to Discord
        uses: cabreraevil/discord-notify-action@v1
        with:
          webhook_url: ${{ https://discord.com/api/webhooks/1478233484576423976/WbRa_ZsPNuTlzgCN9MGW7TaUqCBaDqgX0rErKaDKp_EBx7ltl0P_JRbZAwsgTvO9CirY }}
          username: 'GitHub Bot'
          # Customize your message here
          message: "New commit pushed to ${{ github.repository }} by ${{ github.actor }}! 🚀"
          embed_title: "Commit Details"
          embed_description: "View changes: ${{ github.event.head_commit.url }}"
          embed_color: '#00FF00'
